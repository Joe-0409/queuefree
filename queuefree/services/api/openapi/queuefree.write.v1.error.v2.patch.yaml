# Batch 13C / V2 OpenAPI YAML overlay
# Purpose:
#   Add V2 error responses for C-end write actions without changing any success schema.
# Notes:
#   - Keep servers without /v1.
#   - Keep paths with full /v1/... prefix.
#   - Reuse ApiErrorResponse only. Do not introduce new error fields.
paths:
  /v1/orders:
    post:
      responses:
        '201':
          description: Order created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateOrderResponse'
        '400':
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: Related resource not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'

  /v1/orders/{orderId}/payment-intents:
    post:
      responses:
        '201':
          description: Payment intent created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreatePaymentIntentResponse'
        '404':
          description: Order not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '409':
          description: Order state conflict.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'

  /v1/queue-guard/check-in:
    post:
      responses:
        '200':
          description: Queue guard check-in succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserQueueGuardResponse'
        '400':
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
